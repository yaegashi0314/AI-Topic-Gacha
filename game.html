<!DOCTYPE html>
<html lang="ja">

<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI話題ガチャ</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        #hobbyText {
            color: #666;
            margin-bottom: 20px;
        }

        .topic-box {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            color: #ff6b6b;
            border: 2px dashed #ff6b6b;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 25px;
            background-color: #fff5f5;
        }

        button {
            background-color: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        button:hover {
            background-color: #fa5252;
        }

    </style>

</head>


<body>


<div class="container">

    <h1>:クラッカー: AI話題ガチャ</h1>


    <p id="hobbyText"></p>


    <div class="topic-box" id="topicDisplay">
        ボタンを押して話題を出そう！
    </div>


    <button onclick="generateTopic()">
        話題をひく！
    </button>


</div>



<script src="script.js"></script>


</body>

</html>
